# Use a Node.js image suitable for the project
image: node:14

stages:
  - scan

snyk-scan:
  stage: scan
  image: 
    name: snyk/snyk:node
    entrypoint: [""]
  script:
    # 1. Install dependencies for nodejs-goof
    - npm install
    
    # 2. Run the Snyk test
    # The 'nodejs-goof' project is intentionally vulnerable, 
    # so 'snyk test' will likely fail the build.
    - snyk test
    
    # 3. Optional: Monitor the project in your Snyk dashboard
    - snyk monitor
  rules:
    - if: $CI_COMMIT_BRANCH == "master" || $CI_COMMIT_BRANCH == "main"