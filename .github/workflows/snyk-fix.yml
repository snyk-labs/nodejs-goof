name: Security Scan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  snyk-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Snyk CLI
        run: npm install -g snyk

      - name: Run Snyk Test
        shell: bash
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        # We use "|| true" to ensure the pipeline doesn't stop here, 
        # so we can still upload the results file as an artifact.
        run: |
          snyk test --all-projects \
            --reachability=true \
            --severity-threshold=critical \
            --fail-on=upgradable \
            --json-file-output=test_results.json || export SNYK_EXIT_CODE=$?
          echo "SNYK_EXIT_CODE=$SNYK_EXIT_CODE" >> $GITHUB_ENV

      - name: Upload Snyk Results
        uses: actions/upload-artifact@v4
        with:
          name: snyk-test-results
          path: test_results.json
          retention-days: 7

      - name: Check Snyk Exit Code
        run: |
          if [ "${{ env.SNYK_EXIT_CODE }}" -ne "0" ] && [ ! -z "${{ env.SNYK_EXIT_CODE }}" ]; then
            echo "Snyk found critical vulnerabilities or policy violations. Failing build."
            exit 1
          fi
