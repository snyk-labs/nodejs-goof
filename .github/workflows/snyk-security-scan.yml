name: Snyk Security Scan

on:
  push:
    branches: [ main, master ]
  # pull_request:
  #   branches: [ main, master ]
  workflow_dispatch:

jobs:
  security-scan:
    name: Run Snyk Security Scan
    runs-on: ubuntu-latest
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      SNYK_CFG_ORG: varner-tech-engineering
      SNYK_CFG_PROJECT_NAME: nodejs-goof-ga
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.0

      - name: Run Snyk IaC scan for Terraform
        uses: snyk/actions/iac@master
        continue-on-error: true
        with:
          file: vulnerable.tf
          args: --report
          # Enable SARIF output for GitHub code scanning
          sarif: true

      - name: Monitor Terraform IaC in Snyk
        uses: snyk/actions/iac@master
        continue-on-error: true
        with:
          command: monitor
          file: vulnerable.tf

      - name: Run Snyk Code scan
        uses: snyk/actions@master
        continue-on-error: true
        with:
          command: code
          args: --severity-threshold=high

      - name: Monitor Snyk Code scan
        uses: snyk/actions@master
        continue-on-error: true
        with:
          command: code
          monitor_mode: true
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18.x'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run Snyk test for Node.js dependencies
        uses: snyk/actions/node@master
        continue-on-error: true
        with:
          args: --severity-threshold=high

      - name: Monitor Node.js dependencies in Snyk
        uses: snyk/actions/node@master
        continue-on-error: true
        with:
          command: monitor
      
      - name: Scan base Node.js image
        uses: snyk/actions/node@master
        continue-on-error: true
        with:
          args: --docker node:14.18.1 --severity-threshold=high

      - name: Monitor base Node.js image in Snyk
        uses: snyk/actions/node@master
        continue-on-error: true
        with:
          command: monitor
          args: --docker node:14.18.1
      
      - name: Upload Snyk results as artifact
        if: always()  # Always run this step even if previous steps fail
        uses: actions/upload-artifact@v4
        with:
          name: snyk-results
          path: snyk*.json
          if-no-files-found: ignore
      
      - name: Build and scan container image
        run: |
          docker build -t nodejs-goof .
          docker save nodejs-goof -o nodejs-goof-image.tar
      
      - name: Run Snyk test for Dockerfile
        uses: snyk/actions/docker@master
        continue-on-error: true
        with:
          image: nodejs-goof
          args: --severity-threshold=high --file=Dockerfile

      - name: Monitor Docker image in Snyk
        uses: snyk/actions/docker@master
        continue-on-error: true
        with:
          command: monitor
          image: nodejs-goof
          args: --file=Dockerfile