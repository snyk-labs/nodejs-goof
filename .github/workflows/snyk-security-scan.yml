  sbom:
    name: Generate and Distribute SBOM
    # needs: security-scan
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Snyk CLI
        uses: snyk/actions/setup@master

      - name: Authenticate Snyk CLI
        run: snyk auth "${{ secrets.SNYK_TOKEN }}"

      - name: Generate SBOM (CycloneDX JSON)
        run: |
          echo "Attempting SBOM generation with Snyk..."
          if snyk sbom --format=cyclonedx1.6+json > sbom.cdx.json; then
            echo "Snyk SBOM generation completed successfully"
            ls -la sbom.cdx.json
          else
            echo "Snyk SBOM failed, checking partial output..."
            ls -la sbom.cdx.json || echo "No SBOM file created"
            if [ -f sbom.cdx.json ]; then
              echo "Partial SBOM file exists, checking content:"
              head -20 sbom.cdx.json || true
            fi
            
            echo "Falling back to Syft for SBOM generation..."
            rm -f sbom.cdx.json
            
            # Install Syft
            curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
            
            # Generate SBOM with Syft
            syft . -o cyclonedx-json=sbom.cdx.json
            echo "Syft SBOM generation completed successfully"
            ls -la sbom.cdx.json
          fi

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-sbom
          path: sbom.cdx.json

      - name: Attach SBOM to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: sbom.cdx.json

      - name: Display SBOM info
        run: |
          echo "SBOM generated successfully"
          ls -la sbom.cdx.json
          echo "SBOM size: $(wc -c < sbom.cdx.json) bytes"