name: Snyk Security Scan

on:
  push:
    branches: [ main, master ]
  # pull_request:
  #   branches: [ main, master ]
  workflow_dispatch:

jobs:
  security-scan:
    name: Run Snyk Security Scan
    runs-on: ubuntu-latest
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      SNYK_CFG_ORG: varner-tech-engineering
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.0

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18.x'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci

      - name: Run Snyk test for Node.js dependencies (SCA)
        uses: snyk/actions/node@master
        continue-on-error: true
        with:
          args: --severity-threshold=high --project-name=nodejs-goof-ga-sca --target-reference=nodejs-goof-ga-target --target-name=nodejs-goof-ga --remote-repo-url=nodejs-goof-ga-target

      - name: Monitor Node.js dependencies in Snyk (SCA)
        uses: snyk/actions/node@master
        continue-on-error: true
        with:
          command: monitor
          args: --project-name=nodejs-goof-ga-sca --target-reference=nodejs-goof-ga-target --target-name=nodejs-goof-ga --remote-repo-url=nodejs-goof-ga-target

      - name: Run Snyk Code scan (SAST)
        uses: snyk/actions@master
        continue-on-error: true
        with:
          command: code
          args: --severity-threshold=high --project-name=nodejs-goof-ga-sast --target-reference=nodejs-goof-ga-target --target-name=nodejs-goof-ga --remote-repo-url=nodejs-goof-ga-target

      - name: Monitor Snyk Code scan (SAST)
        uses: snyk/actions@master
        continue-on-error: true
        with:
          command: code
          monitor_mode: true
          args: --project-name=nodejs-goof-ga-sast --target-reference=nodejs-goof-ga-target --target-name=nodejs-goof-ga --remote-repo-url=nodejs-goof-ga-target

      - name: Scan base Node.js image
        uses: snyk/actions/node@master
        continue-on-error: true
        with:
          args: --docker node:14.18.1 --severity-threshold=high --project-name=nodejs-goof-ga-container-base-image --target-reference=nodejs-goof-ga-target --target-name=nodejs-goof-ga --remote-repo-url=nodejs-goof-ga-target

      - name: Monitor base Node.js image in Snyk
        uses: snyk/actions/node@master
        continue-on-error: true
        with:
          command: monitor
          args: --docker node:14.18.1 --project-name=nodejs-goof-ga-container-base-image --target-reference=nodejs-goof-ga-target --target-name=nodejs-goof-ga --remote-repo-url=nodejs-goof-ga-target
          args: --severity-threshold=high --project-name=nodejs-goof-ga-sast --target-reference=nodejs-goof-ga-target --target-name=nodejs-goof-ga --remote-repo-url=nodejs-goof-ga-target

      - name: Monitor Snyk Code scan
        uses: snyk/actions@master
        continue-on-error: true
        with:
          command: code
          monitor_mode: true
          args: --project-name=nodejs-goof-ga-sast --target-reference=nodejs-goof-ga-target --target-name=nodejs-goof-ga --remote-repo-url=nodejs-goof-ga-target

          if-no-files-found: ignore
      
      - name: Build and scan container image
        run: |
          docker build -t nodejs-goof .
          docker save nodejs-goof -o nodejs-goof-image.tar
      
      - name: Run Snyk test for Dockerfile
        uses: snyk/actions/docker@master
        continue-on-error: true
        with:
          image: nodejs-goof
          args: --severity-threshold=high --file=Dockerfile --project-name=nodejs-goof-ga-container-full --target-reference=nodejs-goof-ga-target --target-name=nodejs-goof-ga

      - name: Monitor Docker image in Snyk
        uses: snyk/actions/docker@master
        continue-on-error: true
        with:
          command: monitor
          image: nodejs-goof
          args: --file=Dockerfile --project-name=nodejs-goof-ga-container-full --target-reference=nodejs-goof-ga-target --target-name=nodejs-goof-ga